
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, sans-serif); background: transparent; }

.loader-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  padding: 8px 0 16px;
}

.loader-card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 16px;
  padding: 24px 16px 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.anim-wrap {
  width: 90px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.label {
  font-size: 13px;
  color: var(--color-text-secondary);
  text-align: center;
  line-height: 1.5;
}

.sublabel {
  font-size: 11px;
  color: var(--color-text-tertiary);
  text-align: center;
}

/* ── 1. Book page turn ── */
.book { position: relative; width: 72px; height: 56px; }
.book-spine {
  position: absolute; left: 34px; top: 0;
  width: 4px; height: 56px;
  background: #534AB7; border-radius: 1px;
}
.book-cover {
  position: absolute; left: 4px; top: 4px;
  width: 30px; height: 48px;
  background: #7F77DD; border-radius: 3px 0 0 3px;
}
.book-back {
  position: absolute; right: 4px; top: 4px;
  width: 30px; height: 48px;
  background: #AFA9EC; border-radius: 0 3px 3px 0;
}
.page {
  position: absolute;
  top: 6px; left: 6px;
  width: 28px; height: 44px;
  background: #f5f3ff;
  border-radius: 2px;
  transform-origin: right center;
  animation: pageTurn 1.4s ease-in-out infinite;
}
.page:nth-child(4) { animation-delay: 0s; background: #ede9fb; }
.page:nth-child(5) { animation-delay: 0.2s; background: #e6e2f8; }
.page:nth-child(6) { animation-delay: 0.4s; background: #ddd8f5; }

@keyframes pageTurn {
  0%   { transform: rotateY(0deg) scaleX(1); opacity: 1; }
  40%  { transform: rotateY(-80deg) scaleX(0.2); opacity: 0.7; }
  50%  { transform: rotateY(-90deg) scaleX(0); opacity: 0; }
  51%  { transform: rotateY(90deg) scaleX(0); opacity: 0; left: 38px; }
  60%  { transform: rotateY(80deg) scaleX(0.2); opacity: 0.7; left: 38px; }
  100% { transform: rotateY(0deg) scaleX(1); opacity: 1; left: 38px; }
}

/* ── 2. Lightning bolt pulse ── */
.bolt-wrap {
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.bolt-ring {
  position: absolute;
  width: 70px; height: 70px;
  border-radius: 50%;
  border: 2px solid #7F77DD;
  animation: ringPulse 1.2s ease-out infinite;
}
.bolt-ring:nth-child(2) { animation-delay: 0.4s; }
.bolt-ring:nth-child(3) { animation-delay: 0.8s; }
@keyframes ringPulse {
  0%   { transform: scale(0.5); opacity: 0.9; }
  100% { transform: scale(1.4); opacity: 0; }
}
.bolt-svg { position: relative; z-index: 1; animation: boltBounce 1.2s ease-in-out infinite; }
@keyframes boltBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-4px) scale(1.1); }
}

/* ── 3. Flashcard flip ── */
.card-scene {
  perspective: 300px;
}
.card-flipper {
  width: 70px; height: 50px;
  position: relative;
  transform-style: preserve-3d;
  animation: cardFlip 2s ease-in-out infinite;
}
@keyframes cardFlip {
  0%   { transform: rotateY(0deg); }
  40%  { transform: rotateY(180deg); }
  60%  { transform: rotateY(180deg); }
  100% { transform: rotateY(360deg); }
}
.card-face {
  position: absolute; width: 100%; height: 100%;
  border-radius: 6px;
  backface-visibility: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500;
}
.card-front {
  background: #7F77DD;
  color: #EEEDFE;
}
.card-back {
  background: #FAC775;
  color: #633806;
  transform: rotateY(180deg);
}
.card-line {
  width: 36px; height: 4px;
  border-radius: 2px;
  background: currentColor;
  opacity: 0.6;
}
.card-line2 {
  width: 24px; height: 4px;
  border-radius: 2px;
  background: currentColor;
  opacity: 0.4;
  margin-top: 5px;
}

/* ── 4. Brain dots (thinking) ── */
.brain-dots {
  display: flex; gap: 8px; align-items: flex-end;
}
.dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: #7F77DD;
  animation: dotBounce 1s ease-in-out infinite;
}
.dot:nth-child(1) { animation-delay: 0s; }
.dot:nth-child(2) { animation-delay: 0.15s; background: #AFA9EC; }
.dot:nth-child(3) { animation-delay: 0.3s; background: #FAC775; }
.dot:nth-child(4) { animation-delay: 0.45s; background: #EF9F27; }
@keyframes dotBounce {
  0%, 100% { transform: translateY(0); }
  40% { transform: translateY(-16px); }
  60% { transform: translateY(-8px); }
}

/* ── 5. Progress bar ── */
.prog-bar-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  width: 80px;
}
.prog-label { font-size: 11px; color: var(--color-text-secondary); }
.prog-track {
  width: 80px; height: 8px; background: #EEEDFE; border-radius: 4px; overflow: hidden;
}
.prog-fill {
  height: 100%; border-radius: 4px;
  background: #7F77DD;
  animation: progSweep 1.6s ease-in-out infinite;
}
@keyframes progSweep {
  0%   { width: 0%; }
  70%  { width: 100%; }
  85%  { width: 100%; }
  100% { width: 0%; }
}
.prog-star {
  animation: starSpin 2s linear infinite;
  color: #EF9F27;
  font-size: 22px;
}
@keyframes starSpin {
  0%   { transform: rotate(0deg) scale(1); }
  50%  { transform: rotate(180deg) scale(1.2); }
  100% { transform: rotate(360deg) scale(1); }
}

/* ── 6. Pencil write ── */
.pencil-wrap { position: relative; width: 80px; height: 80px; }
.pencil {
  position: absolute;
  animation: pencilWrite 1.5s ease-in-out infinite;
}
@keyframes pencilWrite {
  0%   { transform: translate(0px, 0px) rotate(-30deg); }
  25%  { transform: translate(20px, 5px) rotate(-30deg); }
  50%  { transform: translate(10px, 15px) rotate(-30deg); }
  75%  { transform: translate(30px, 20px) rotate(-30deg); }
  100% { transform: translate(0px, 0px) rotate(-30deg); }
}
.line-draw {
  position: absolute;
  height: 2px; border-radius: 1px;
  background: #534AB7;
  animation: lineGrow 1.5s ease-in-out infinite;
}
.line-draw:nth-child(2) { top: 28px; left: 10px; animation-delay: 0s; }
.line-draw:nth-child(3) { top: 43px; left: 10px; animation-delay: 0.3s; }
.line-draw:nth-child(4) { top: 58px; left: 10px; animation-delay: 0.6s; }
@keyframes lineGrow {
  0%   { width: 0px; opacity: 0; }
  30%  { width: 50px; opacity: 1; }
  80%  { width: 50px; opacity: 1; }
  100% { width: 50px; opacity: 0.2; }
}
</style>

<div class="loader-grid">

  <div class="loader-card">
    <div class="anim-wrap">
      <div class="book">
        <div class="book-cover"></div>
        <div class="book-back"></div>
        <div class="book-spine"></div>
        <div class="page"></div>
        <div class="page"></div>
        <div class="page"></div>
      </div>
    </div>
    <div class="label">Book turning pages</div>
    <div class="sublabel">classic loading feel</div>
  </div>

  <div class="loader-card">
    <div class="anim-wrap">
      <div class="bolt-wrap">
        <div class="bolt-ring"></div>
        <div class="bolt-ring"></div>
        <div class="bolt-ring"></div>
        <svg class="bolt-svg" width="28" height="42" viewBox="0 0 28 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="18,2 4,22 14,22 10,40 26,18 15,18 22,2" fill="#FAC775" stroke="#EF9F27" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="label">Flash pulse</div>

  </div>

  <div class="loader-card">

        <div class="card-flipper">
          <div class="card-face card-front">
            <div>
              <div class="card-line"></div>

            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="label">Flashcard flip</div>
    <div class="sublabel">on-brand for FlashMaster</div>
  </div>

  <div class="loader-card">
    <div class="anim-wrap">
      <div class="brain-dots">
        <div class="dot"></div>
        <div class="dot"></div>

  <div class="loader-card">

          <polygon points="18,3 21.5,13 32,13 23.5,19.5 26.5,30 18,23.5 9.5,30 12.5,19.5 4,13 14.5,13" fill="#EF9F27" stroke="#BA7517" stroke-width="1"/>
